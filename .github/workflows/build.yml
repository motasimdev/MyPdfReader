name: Build MyPdfReader

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages
        run: dotnet restore src/MyPdfReader.csproj

      - name: Build (Release, x64)
        run: dotnet build src/MyPdfReader.csproj -c Release -r win-x64 --self-contained false --no-restore

      - name: Publish
        run: dotnet publish src/MyPdfReader.csproj -c Release -r win-x64 --self-contained false -o publish_output

      - name: Upload built app
        uses: actions/upload-artifact@v4
        with:
          name: MyPdfReader-win-x64
          path: publish_output/
          retention-days: 30
